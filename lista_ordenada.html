<!DOCTYPE html>

<title>Ejemplo de lista ordenada</title>
</head>
<body>
<p>Lista de 5 animales ordenados de mayor a menor
tamaño:</p>
<ol type="1">
 <li>Elefante</li>
 <li>Cebra</li>
 <li>Oveja</li>
 <li>Gato</li>
 <li>Ratón</li>
</ol>
<hr>
<ol type="a">
 <li>Elefante</li>
 <li>Cebra</li>
 <li>Oveja</li>
 <li>Gato</li>
 <li>Ratón</li>
</ol>
<hr>
<ol type="A">
 <li>Elefante</li>
 <li>Cebra</li>
 <li>Oveja</li>
 <li>Gato</li>
 <li>Ratón</li>
</ol>
<hr>
<ol type="I">
    <li>Elefante</li>
    <li>Cebra</li>
    <li>Oveja</li>
    <li>Gato</li>
    <li>Ratón</li>
</ol>
</body>
</html>
